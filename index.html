<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby McGee App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Baby McGee">
    <meta name="theme-color" content="#667eea">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍼 Baby McGee App</h1>
            <p>Private data logging for Baby McGee</p>
        </header>

        <main>
            <div class="auth-section" id="authSection">
                <h2>Access Required</h2>
                <p>Please enter the access code to continue:</p>
                <input type="password" id="accessCode" placeholder="Enter access code">
                <button onclick="authenticate()">Access App</button>
                <div id="authError" class="error-message"></div>
            </div>

            <div class="app-content" id="appContent" style="display: none;">
                <div class="data-entry">
                    <h2>Log New Entry</h2>
                    <form id="dataForm">
                        <div class="form-group">
                            <label for="timestamp">Date & Time:</label>
                            <input type="datetime-local" id="timestamp" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="category">Category:</label>
                            <select id="category" required>
                                <option value="">Select category...</option>
                                <option value="feeding">🍼 Feeding</option>
                                <option value="diaper">👶 Diaper Change</option>
                                <option value="sleep">😴 Sleep</option>
                                <option value="milestone">🎉 Milestone</option>
                                <option value="health">🏥 Health</option>
                                <option value="other">📝 Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="notes">Notes:</label>
                            <textarea id="notes" rows="3" placeholder="Add any additional notes..."></textarea>
                        </div>
                        
                        <button type="submit">Log Entry</button>
                    </form>
                </div>

                <div class="data-display">
                    <h2>Recent Entries</h2>
                    <div class="filter-controls">
                        <select id="filterCategory">
                            <option value="">All categories</option>
                            <option value="feeding">🍼 Feeding</option>
                            <option value="diaper">👶 Diaper Change</option>
                            <option value="sleep">😴 Sleep</option>
                            <option value="milestone">🎉 Milestone</option>
                            <option value="health">🏥 Health</option>
                            <option value="other">📝 Other</option>
                        </select>
                        <button onclick="exportData()">Export Data</button>
                    </div>
                    <div id="entriesList" class="entries-list">
                        <!-- Entries will be populated here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
